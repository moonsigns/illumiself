<svg width="100%" height="100%" viewBox="0 0 1400 600" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7f8"/>
      <stop offset="100%" stop-color="#eceff1"/>
    </linearGradient>

    <!-- dot pattern -->
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#b0bec5" opacity="0.35"/>
    </pattern>

    <!-- fading mask -->
    <radialGradient id="fadeDots">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <mask id="dotMask">
      <rect width="100%" height="100%" fill="url(#fadeDots)"/>
    </mask>

  </defs>

  <!-- base -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- dotted areas -->
  <rect x="0" y="0" width="700" height="300" fill="url(#dots)" mask="url(#dotMask)" opacity="0.6"/>
  <rect x="600" y="250" width="700" height="350" fill="url(#dots)" mask="url(#dotMask)" opacity="0.5"/>

  <!-- geometric shapes -->

  <rect x="250" y="-120" width="500" height="500"
        fill="#cfd8dc"
        opacity="0.12"
        transform="rotate(35 500 200)"/>

  <rect x="900" y="-150" width="450" height="450"
        fill="#b0bec5"
        opacity="0.10"
        transform="rotate(-35 1100 200)"/>

  <rect x="500" y="200" width="350" height="350"
        fill="#cfd8dc"
        opacity="0.10"
        transform="rotate(45 650 350)"/>

  <!-- soft curved shapes -->

  <path d="M0 450 C300 350 500 500 800 400 C1100 300 1200 450 1400 380 L1400 600 L0 600 Z"
        fill="#b0bec5"
        opacity="0.08"/>

  <path d="M0 200 C250 120 400 260 700 180 C1000 100 1200 220 1400 150"
        stroke="#cfd8dc"
        stroke-width="120"
        fill="none"
        opacity="0.08"/>

</svg>